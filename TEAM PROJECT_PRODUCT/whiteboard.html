<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Whiteboard</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e0a2ea;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start; /* push content slightly down */
  height: 100vh;
}

header
{ 
  background:#D8B4F8;
  text-align:center;
  padding:15px;
  width:90%;
  margin:20px auto 20px auto;
  border-radius:15px; 
}

.board {
  width: 85vw;
  height: 80vh;
  background: white;
  border-radius: 25px;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  overflow: hidden;
  margin-top: 10px;
}

.toolbar {
  position: absolute;
  bottom: 15px;
  right: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sticky-template {
  width: 100px;
  height: 100px;
  background: #ffeb3b;
  border-radius: 20px;
  border: 1px solid #ccc;
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
}

.note {
  width: 150px;
  height: 150px;
  background: #ffeb3b;
  position: absolute;
  padding: 10px;
  border-radius: 20px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  cursor: move;
}

.note textarea {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  resize: none;
  outline: none;
  font-size: 14px;
}

/* Navigation buttons */
.prev-btn, .next-btn {
  position: fixed;
  bottom: 20px;
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}
.prev-btn { left: 30px; background: rgb(238, 167, 242); }
.next-btn { right: 30px; background: rgb(238, 168, 241); }
</style>
</head>
<body>

<header>Studnet Q&A Board</header>

<div class="board" id="board">
  <div class="toolbar">
    <div class="sticky-template" id="addNote">+ Note</div>
  </div>
</div>

<!-- Navigation buttons -->
<a href="forum.html" class="prev-btn">Back</a>
<a href="support.html" class="next-btn">Next →</a>

<script>
const board = document.getElementById("board");
const addNoteBtn = document.getElementById("addNote");

let offsetX, offsetY, isDragging = false, currentNote = null;
let noteOffset = 0;

addNoteBtn.addEventListener("click", () => {
  const note = document.createElement("div");
  note.className = "note";

  note.style.left = (30 + noteOffset) + "px";
  note.style.top = (30 + noteOffset) + "px";
  noteOffset += 20;

  const textarea = document.createElement("textarea");
  textarea.placeholder = "Write your idea...";

  note.appendChild(textarea);
  board.appendChild(note);

  makeDraggable(note);
});

function makeDraggable(note) {
  note.addEventListener("mousedown", (e) => {
    isDragging = true;
    currentNote = note;
    offsetX = e.clientX - note.offsetLeft;
    offsetY = e.clientY - note.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging || currentNote !== note) return;
    note.style.left = (e.clientX - offsetX) + "px";
    note.style.top = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
    currentNote = null;
  });
}
</script>

</body>
</html>
